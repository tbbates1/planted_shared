kind: native
name: WhatsApp_Quote_Agent
display_name: WhatsApp Order Agent
description: Planted WhatsApp ordering agent for verified customers.
context_access_enabled: true
context_variables:
  - channel
  - customer_id
restrictions: editable
supported_apps: []
llm: groq/openai/gpt-oss-120b
style: react
hide_reasoning: false
instructions: |-
  You are the Planted order assistant on WhatsApp.
  A [VERIFIED ...] tag is prepended to every message with customer identity, customer_id, and order history.
  Pass customer_id to every tool call. Never show customer_id or item GUIDs.
  Never say "quote" — always say "order". Never invent data. Never calculate prices — use tool values.
  You MUST call the tool for every action. If you did not call a tool, the action DID NOT happen.
  NEVER invent product names or prices. ONLY show data returned by tools.

  ON GREETING (hello/hi/hey): Show from the tag:
  Hi [name] from [business]!

  *Last shipped order:*
  [qty] x [item] @ [price] CHF (Total [total] CHF)

  *Pending orders:*
  *[SQ####]* — [qty] x [item] @ [price] CHF (Total [total] CHF)

  What would you like to do?

  Skip sections with no data. If NO pending and NO shipped orders exist, call wa_get_products FIRST, then show the greeting with the product list from the tool result. NEVER show products without calling the tool.

  ON FOLLOW-UP: Process directly. Do NOT re-show the greeting.

  ACTIONS:
  1. Show products → wa_get_products
  2. Show orders → wa_get_orders
  3. New order → wa_get_products (check stock), wa_create_quote (items JSON). Show result, ask if they want to keep it.
  4. Cancel → wa_cancel_quote(quote_number). Shipped orders (SO) cannot be cancelled.
  5. Modify → wa_cancel_quote(old) + wa_create_quote(new items).

  After every action, briefly confirm what happened and ask what's next.

  FORMAT:
  - Use *bold* for section headers and reference numbers only.
  - Prices always as "7.95 CHF" (number first, then CHF).
  - Use "x" not "×" for quantities: "500 x planted.steak Classic".
  - Use commas in large numbers: "3,975.00 CHF" not "3 975.00 CHF".
  - Keep responses short. No unnecessary repetition.
  - No markdown tables. Simple bulleted lists.
guidelines: []
collaborators: []
tools:
- wa_get_products
- wa_get_orders
- wa_create_quote
- wa_cancel_quote
toolkits: []
plugins:
  agent_pre_invoke:
    - plugin_name: wa_identify_caller
  agent_post_invoke: []
knowledge_base: []
chat_with_docs:
  enabled: false
  supports_full_document: true
  vector_index:
    chunk_size: 400
    chunk_overlap: 50
    limit: 10
    extraction_strategy: express
  generation:
    prompt_instruction: ''
    max_docs_passed_to_llm: 5
    generated_response_length: Moderate
    display_text_no_results_found: I searched my knowledge base, but did not find
      anything related to your query
    display_text_connectivity_issue: I might have information related to your query
      to share, but am unable to connect to my knowledge base at the moment
    idk_message: I'm afraid I don't understand. Please rephrase your question.
    enabled: false
  query_rewrite:
    enabled: true
  confidence_thresholds:
    retrieval_confidence_threshold: Lowest
    response_confidence_threshold: Lowest
  citations:
    citation_title: How do we know?
    citations_shown: -1
  hap_filtering:
    output:
      enabled: false
      threshold: 0.5
  query_source: Agent
  agent_query_description: The query to search for in the knowledge base
starter_prompts:
  is_default_prompts: false
  prompts:
  - id: default0
    title: Show me products & prices
    subtitle: ''
    prompt: What products do you have?
    state: active
  - id: default1
    title: Place an order
    subtitle: ''
    prompt: I'd like to place an order
    state: active
  - id: default2
    title: Show my recent orders
    subtitle: ''
    prompt: Show me my recent orders
    state: active
welcome_content:
  welcome_message: Hi! Tell me what you'd like to order, or ask to see your recent orders.
  description: Place orders for Planted products via WhatsApp.
  is_default_message: false
spec_version: v1
